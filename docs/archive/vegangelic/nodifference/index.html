  /* 2. GRID LINKS: Neutralize the flexbox / min-width styles causing the layout drift */

    width: 100% !important; 
    height: auto !important;

    margin: 0 !important;

  /* =============================================================
   GLIGHTBOX GHOST OVERRIDE CLEANUP
   ============================================================= */

/* Completely hide the zoom utility button */

}

/* Force-reset structural styles inside the lightbox canvas container */
.glightbox-container .ginner-container img,
.glightbox-container .carousel-grid img,
.glightbox-container img {
  width: auto !important;
  height: auto !important;
  max-width: 100% !important;
  max-height: 95vh !important;
  min-height: 0 !important;
  aspect-ratio: auto !important;
  object-fit: contain !important; /* Preserves clear aspect integrity in view mode */
  transform: none !important;
}

/* Strip structural wrapping grids if cloned by the animation scripts */
.glightbox-container .carousel-grid,
.glightbox-container .carousel {
  display: block !important;
  width: auto !important;
  height: auto !important;
  gap: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
}

.glightbox-container main .carousel .carousel-grid a.glightbox,
.glightbox-container a.glightbox {
  display: inline-block !important;
  width: auto !important;
  min-width: 0 !important;
  flex: none !important;
}

/* =============================================================
   ISOLATED GLIGHTBOX FIX (DOES NOT TOUCH POST CARD IMAGES)
   ============================================================= */

/* Force-kill the phantom layout box when GLightbox copies your elements */
.glightbox-container .carousel-grid,
.glightbox-container .carousel,
.glightbox-container .post-view-wrapper main {
  display: block !important;
  grid-template-columns: none !important;

  padding: 0 !important;
  margin: 0 !important;

  border: none !important;
  box-shadow: none !important;

/* Ensure the temporary rendering link within the modal behaves normally */
.glightbox-container .carousel-grid a.glightbox,

  width: auto !important;

/* Ensure only the active preview image scales inside the viewport */

/* =============================================================
   PERFECT JUMP & PHANTOM BOX ELIMINATION
   ============================================================= */

/* Force the vertical scrollbar track to stay pinned to the screen at all times */
html, 
html.glightbox-open {
  overflow-y: scroll !important;
}

/* Strip GLightbox's dynamic padding adjustments so the page remains rigid */
body.glightbox-open {

/* =============================================================
   HORIZONTAL SCROLLBAR STABILIZER

/* Strictly prevent any element on the page from overflowing horizontally */

body {

/* Ensure the body remains rigid on the x-axis when GLightbox is open */
body.glightbox-open {

<script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. Dynamic Path Fixer: Extract real generated image URLs before Lightbox fires
    document.querySelectorAll('.carousel-grid a.glightbox').forEach(link => {
      const internalImg = link.querySelector('img');
      if (internalImg) {
        const computedSrc = internalImg.getAttribute('src');
        if (computedSrc) {
          link.setAttribute('href', computedSrc);
        }
      }
    });

    // 2. Initialize Lightbox
   // Initialize GLightbox with safe transition tracking
// Initialize GLightbox without allowing it to shift body widths
// Initialize GLightbox without letting it lock or shift the page scrollbars
// 2. Initialize Lightbox
  const lightbox = GLightbox({
  selector: '.glightbox',
  loop: true,
  openEffect: 'fade',
  closeEffect: 'fade',
  closeOnOutsideClick: true,
  zoomable: false,   
  draggable: true    
});
    // FIXED WORKAROUND: Force lightbox closure when clicking on any background container asset
document.addEventListener('click', function (e) {
  // Check if the lightbox is currently active/open on screen
  const isOpen = document.body.classList.contains('glightbox-open');
  if (!isOpen) return;

  // Track if the click lands directly on the image element or navigation controls
  const clickedImage = e.target.closest('.gslide-image img, .gslide-video, .gslide-inline');
  const clickedControl = e.target.closest('.gbtn, .gnext, .gprev, .gclose');

  // If the user clicked the backdrop area (not the image, video, or navigation buttons), close it!
  if (!clickedImage && !clickedControl && e.target.closest('.glightbox-container')) {
    lightbox.close();
  }
}, false);
    // Auto hyperlink strings check
    const desc = document.getElementById("description-content");
    if (desc) {
      const urlRegex = /(https?:\/\/[^\s<]+)/g;
      const walk = document.createTreeWalker(desc, NodeFilter.SHOW_TEXT, null, false);
      const nodesToReplace = [];
      let textNode;
      while (textNode = walk.nextNode()) {
        if (urlRegex.test(textNode.nodeValue)) {
          nodesToReplace.push(textNode);
        }
      }
      nodesToReplace.forEach(textNode => {
        const parent = textNode.parentElement;
        const div = document.createElement('div');
        div.innerHTML = textNode.nodeValue.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        while (div.firstChild) {
          parent.insertBefore(div.firstChild, textNode);
        }
        parent.removeChild(textNode);
      });
    }

    // Convert line-breaks inside description containers 
    if (desc) {
      const paragraphs = desc.querySelectorAll("p");
      paragraphs.forEach(p => {
        if (p.innerHTML.includes("<br")) {
          const structuralChunks = p.innerHTML.split(/<br\s*\/?>/);
          const fragment = document.createDocumentFragment();
          structuralChunks.forEach(chunk => {
            if (chunk.trim()) {
              const newP = document.createElement("p");
              newP.innerHTML = chunk.trim();
              fragment.appendChild(newP);
            }
          });
          p.parentNode.insertBefore(fragment, p);
          p.parentNode.removeChild(p);
        }
      });
    }
  });
</script>
