<script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    // 1. Dynamic Path Fixer: Extract real generated image URLs safely
    document.querySelectorAll('.carousel-grid a.glightbox').forEach(link => {
      // If it's explicitly marked as a video or its attributes point to a video, skip it entirely!
      if (link.getAttribute('data-type') === 'video' || (link.getAttribute('href') && link.getAttribute('href').match(/\.(mp4|mov|webm|m4v)$/i))) {
        return;
      }

      const internalImg = link.querySelector('img');
      if (internalImg) {
        const computedSrc = internalImg.getAttribute('src');
        if (computedSrc) {
          link.setAttribute('href', computedSrc);
        }
      }
    });

    // 2. Initialize Lightbox
    const lightbox = GLightbox({
      selector: '.glightbox',
      loop: true,
      openEffect: 'fade',
      closeEffect: 'fade',
      closeOnOutsideClick: true,
      zoomable: false,   
      draggable: true,
      autoplayVideos: true
    });

    // Keep your backdrop close workaround and auto-hyperlink scripts exactly as they are below...
    // FIXED WORKAROUND: Force lightbox closure when clicking on any background container asset
document.addEventListener('click', function (e) {
  // Check if the lightbox is currently active/open on screen
  const isOpen = document.body.classList.contains('glightbox-open');
  if (!isOpen) return;

  // Track if the click lands directly on the image element or navigation controls
  const clickedImage = e.target.closest('.gslide-image img, .gslide-video, .gslide-inline');
  const clickedControl = e.target.closest('.gbtn, .gnext, .gprev, .gclose');

  // If the user clicked the backdrop area (not the image, video, or navigation buttons), close it!
  if (!clickedImage && !clickedControl && e.target.closest('.glightbox-container')) {
    lightbox.close();
  }
}, false);
    // Auto hyperlink strings check
    const desc = document.getElementById("description-content");
    if (desc) {
      const urlRegex = /(https?:\/\/[^\s<]+)/g;
      const walk = document.createTreeWalker(desc, NodeFilter.SHOW_TEXT, null, false);
      const nodesToReplace = [];
      let textNode;
      while (textNode = walk.nextNode()) {
        if (urlRegex.test(textNode.nodeValue)) {
          nodesToReplace.push(textNode);
        }
      }
      nodesToReplace.forEach(textNode => {
        const parent = textNode.parentElement;
        const div = document.createElement('div');
        div.innerHTML = textNode.nodeValue.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        while (div.firstChild) {
          parent.insertBefore(div.firstChild, textNode);
        }
        parent.removeChild(textNode);
      });
    }

    // Convert line-breaks inside description containers 
    if (desc) {
      const paragraphs = desc.querySelectorAll("p");
      paragraphs.forEach(p => {
        if (p.innerHTML.includes("<br")) {
          const structuralChunks = p.innerHTML.split(/<br\s*\/?>/);
          const fragment = document.createDocumentFragment();
          structuralChunks.forEach(chunk => {
            if (chunk.trim()) {
              const newP = document.createElement("p");
              newP.innerHTML = chunk.trim();
              fragment.appendChild(newP);
            }
          });
          p.parentNode.insertBefore(fragment, p);
          p.parentNode.removeChild(p);
        }
      });
    }
  });

  const backToTopBtn = document.getElementById("back-to-top");

    window.addEventListener("scroll", () => {
      // Show button after user scrolls down 400px
      if (window.scrollY > 400) {
        backToTopBtn.classList.add("is-visible");
      } else {
        backToTopBtn.classList.remove("is-visible");
      }
    });

backToTopBtn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    })

    document.addEventListener("DOMContentLoaded", () => {
  const firstThumb = document.querySelector('.thumb');
  if (firstThumb) {
    document.getElementById('featured-image').src = firstThumb.src;
  }
});

// 1. Get all thumbnails and the featured image
const thumbs = document.querySelectorAll('.thumb'); // Ensure your loop adds class 'thumb'
const featured = document.getElementById('featured-image');
let currentIndex = 0;

function updateMainImage(index) {
    const thumbs = document.querySelectorAll('.thumb');
    const featuredLink = document.getElementById('featured-link');

    if (index >= 0 && index < thumbs.length) {
        // Update the image src on the page
        document.getElementById('featured-image').src = thumbs[index].src;
        
        // Update the link for Lightbox
        featuredLink.href = thumbs[index].src;
        
        currentIndex = index;

        // 2. THIS IS THE FIX: Tell GLightbox to update its current slide
        if (lightbox.getActiveSlide()) {
            lightbox.goToSlide(index);
        }
        
        // Highlight active thumbnail
        thumbs.forEach(t => t.style.borderColor = 'transparent');
        thumbs[index].style.borderColor = '#3b82f6';
    }
}
// 2. Add Keyboard Listener
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') {
        updateMainImage(currentIndex + 1);
    } else if (e.key === 'ArrowLeft') {
        updateMainImage(currentIndex - 1);
    }
});

// Initialize the first image on load
if (thumbs.length > 0) updateMainImage(0);
</script>
