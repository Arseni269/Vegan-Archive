<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- This links EVERY PAGE to your stylesheet safely from the root directory -->

<body>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />

<style>
  /* Isolated wrapper breaks away from global side-by-side flex rules */
  .post-view-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: block !important; /* Forces vertical stacking for top elements */
  }

  .back-to-archive-nav { 
    margin-bottom: 0.60rem; 
    display: block;
  }

  .back-link { 
    display: inline-flex; 
    align-items: center; 
    gap: 0.4rem; 
    color: #475569; 
    text-decoration: none; 
    font-size: 0.95rem; 
    font-weight: 500; 
  }
  .back-link:hover { 
    color: #0f172a; 
  }
  
  /* Heading stays at the very top, taking up full width */
  .post-main-title {
    font-size: 2.2rem;
    color: #0f172a;
    margin: 0 0 2rem 0;
    font-weight: 700;
    line-height: 1.2;
    display: block;
    width: 100%;
  }

  /* Two-column grid layout ONLY starts here, under the title */
  .post-layout-grid { 
    display: grid !important; 
    grid-template-columns: 2fr 1fr !important; 
    gap: 2.5rem !important; 
    align-items: start; 
    width: 100%;
  }

  @media (max-width: 900px) { 
    .post-layout-grid { 
      grid-template-columns: 1fr !important; 
      gap: 1.5rem !important; 
    } 
  }

  /* Grid layout for images: exactly 2 per row */
  .carousel-grid { 
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 15px 0rem !important; 
    width: 100%;
    margin: 0;
    padding: 0;
  }

  .carousel-grid a.glightbox { 
    display: block !important; 
    text-decoration: none !important; 
    width: 100% !important;
  }

  .carousel-grid img { 
    width: 100% !important; 
    height: 100% !important;
    max-height: 450px !important;
    object-fit: contain !important;
    border-radius: 0px; 
    display: block;
    background: #f8fafc;
  }

  /* Grid layout for images: exactly 2 per row */
  html body .carousel-grid { 
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px 0px !important; /* 10px vertical row gap, 0px horizontal column gap */
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Target the link container precisely and wipe out the min-width and flex properties */
  html body main .carousel .carousel-grid a.glightbox { 
    display: block !important; 
    text-decoration: none !important; 
    width: 100% !important;
    min-width: 0px !important;     /* Kill the 250px gap instigator */
    flex: none !important;         /* Stop flexbox collision */
    margin: 0 !important;
  }

  /* Force the images to fill their grid column completely with no side gaps */
  html body .carousel-grid img { 
    width: 100% !important; 
    height: auto !important; 
    object-fit: cover !important; /* Prevents letterboxing gaps */
    margin: 0 !important;
    display: block !important;
  }
</style>

    <aside class="sidebar-info-card" style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin: 0;">

        <div class="meta-section" style="margin-bottom: 1.5rem;">
          <a href="https://www.instagram.com/p/DXNVOjfN90O/" target="_blank" rel="noopener noreferrer" class="instagram-link" style="display: inline-block; background: #e1306c; color: white; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: 500;">View on Instagram</a>
        </div>
      

      <div class="meta-section">
        <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem; color: #1e293b;">Description</h3>
        <div id="description-content" style="color: #334155; line-height: 1.6; font-size: 0.95rem;">
          
Correct the relationship between humans and other animals.

<script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. Dynamic Path Fixer: Extract real generated image URLs before Lightbox fires
    document.querySelectorAll('.carousel-grid a.glightbox').forEach(link => {
      const internalImg = link.querySelector('img');
      if (internalImg) {
        const computedSrc = internalImg.getAttribute('src');
        if (computedSrc) {
          link.setAttribute('href', computedSrc);
        }
      }
    });

    // 2. Initialize Lightbox
    const lightbox = GLightbox({
      selector: '.glightbox',
      loop: true,
      openEffect: 'zoom',
      closeEffect: 'zoom',
      closeOnOutsideClick: true
    });

    // FIXED WORKAROUND: Force lightbox closure when clicking on any background container asset
document.addEventListener('click', function (e) {
  // Check if the lightbox is currently active/open on screen
  const isOpen = document.body.classList.contains('glightbox-open');
  if (!isOpen) return;

  // Track if the click lands directly on the image element or navigation controls
  const clickedImage = e.target.closest('.gslide-image img, .gslide-video, .gslide-inline');
  const clickedControl = e.target.closest('.gbtn, .gnext, .gprev, .gclose');

  // If the user clicked the backdrop area (not the image, video, or navigation buttons), close it!
  if (!clickedImage && !clickedControl && e.target.closest('.glightbox-container')) {
    lightbox.close();
  }
}, false);
    // Auto hyperlink strings check
    const desc = document.getElementById("description-content");
    if (desc) {
      const urlRegex = /(https?:\/\/[^\s<]+)/g;
      const walk = document.createTreeWalker(desc, NodeFilter.SHOW_TEXT, null, false);
      const nodesToReplace = [];
      let textNode;
      while (textNode = walk.nextNode()) {
        if (urlRegex.test(textNode.nodeValue)) {
          nodesToReplace.push(textNode);
        }
      }
      nodesToReplace.forEach(textNode => {
        const parent = textNode.parentElement;
        const div = document.createElement('div');
        div.innerHTML = textNode.nodeValue.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        while (div.firstChild) {
          parent.insertBefore(div.firstChild, textNode);
        }
        parent.removeChild(textNode);
      });
    }

    // Convert line-breaks inside description containers 
    if (desc) {
      const paragraphs = desc.querySelectorAll("p");
      paragraphs.forEach(p => {
        if (p.innerHTML.includes("<br")) {
          const structuralChunks = p.innerHTML.split(/<br\s*\/?>/);
          const fragment = document.createDocumentFragment();
          structuralChunks.forEach(chunk => {
            if (chunk.trim()) {
              const newP = document.createElement("p");
              newP.innerHTML = chunk.trim();
              fragment.appendChild(newP);
            }
          });
          p.parentNode.insertBefore(fragment, p);
          p.parentNode.removeChild(p);
        }
      });
    }
  });
</script>
</body>
</html>
