<script>
  document.addEventListener("DOMContentLoaded", function() {
    const lightboxLinks = document.querySelectorAll(".carousel-grid a.glightbox");
    
    lightboxLinks.forEach(link => {
      // Safely target the image inside the responsive layout structures
      const img = link.querySelector("img");
      if (img) {
        let currentSrc = img.currentSrc || img.getAttribute("src");
        
        if (currentSrc) {
          // Normalize base path mappings
          if (!currentSrc.startsWith("http") && !currentSrc.startsWith("/Vegan-Archive")) {
            currentSrc = "/Vegan-Archive/" + currentSrc.replace(/^\//, "");
          }
          // Apply directly back to the activator link anchor
          link.setAttribute("href", currentSrc);
        }
      }
    });

    // Fire GLightbox initialization
    const lightbox = GLightbox({
      selector: '.glightbox',
      loop: true,
      zoomable: true,
      draggable: true
    });
  });
</script>
