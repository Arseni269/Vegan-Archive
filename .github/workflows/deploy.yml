name: Deploy Eleventy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
     run:
        working-directory: vegan-archive # <--- Tells GitHub to jump into your 'vegan' folder first!
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Eleventy Site
        run: npx @11ty/eleventy

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'vegan-archive/_site' # <--- Adds your folder prefix here too so it finds the built site!

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
